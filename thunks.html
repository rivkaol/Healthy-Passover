<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תודה שהצטרפת! - רבקה הולצברג</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Rubik', sans-serif; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
            width: 100%;
            background-color: #F8F9FA;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-bottom: 4px solid #B07D62;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
        }
        .btn-terracotta {
            background: linear-gradient(135deg, #B07D62 0%, #d19a7e 100%);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-terracotta:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(176, 125, 98, 0.3);
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
            transform: scale(1.05);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .step-number {
            background: #1B4D3E;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="text-[#333]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconWrapper = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const CheckCircle = (p) => <IconWrapper {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
        const MessageCircle = (p) => <IconWrapper {...p}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-14.7 8.38 8.38 0 0 1 3.8.9L21 3z"/></IconWrapper>;
        const ExternalLink = (p) => <IconWrapper {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></IconWrapper>;
        const Heart = (p) => <IconWrapper {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></IconWrapper>;
        const Quote = (p) => <IconWrapper {...p}><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.75-2-2-2H4c-1.25 0-2 .75-2 2v7c0 1.25.75 2 2 2h4c0 2.5-1 4.5-4 5.5L3 21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.75-2-2-2h-4c-1.25 0-2 .75-2 2v7c0 1.25.75 2 2 2h4c0 2.5-1 4.5-4 5.5L15 21z"/></IconWrapper>;

        const App = () => {
            const portalUrl = "https://rivkaholtsberg.co.il/Healthy-Passover/";
            const whatsappUrl = "https://wa.me/504207702?text=היי+רבקה,+רכשתי+את+הקורס+ואני+צריכה+עזרה+בהתחברות";

            const formatText = (str) => {
                if (!str) return "";
                const parts = str.split('.');
                return parts.map((p, i) => {
                    const text = p.trim();
                    if (text === "" && i === parts.length - 1) return null;
                    return (
                        <span key={i}>
                            {text}{i < parts.length - 1 ? "." : ""}
                            {i < parts.length - 1 && <br />}
                        </span>
                    );
                });
            };

            return (
                <div dir="rtl" className="min-h-screen flex flex-col items-center">
                    
                    {/* Hero Header */}
                    <div className="w-full bg-[#1B4D3E] py-16 px-4 text-center relative overflow-hidden">
                        <div className="absolute inset-0 opacity-10" style={{backgroundImage: 'radial-gradient(#ffffff 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
                        
                        <div className="relative z-10 animate-float">
                            <div className="bg-white/10 p-4 rounded-full inline-block mb-6">
                                <CheckCircle className="text-[#D4AF37] w-16 h-16" />
                            </div>
                            <h1 className="text-4xl md:text-6xl font-extrabold text-white tracking-tight mb-4">איזה כיף שהצטרפת!</h1>
                            <p className="text-xl md:text-2xl text-green-100 font-light max-w-2xl mx-auto">
                                {formatText("הרכישה הושלמה בהצלחה. הפורטל האישי שלך מחכה לך עם כל המתכונים והסרטונים.")}
                            </p>
                        </div>
                    </div>

                    <main className="max-w-4xl w-full px-4 -mt-10 mb-20 relative z-20">
                        
                        {/* Main Access Card */}
                        <div className="glass-card p-8 md:p-12 rounded-[40px] text-right mb-12">
                            <h2 className="text-2xl md:text-3xl font-bold text-[#1B4D3E] mb-8 italic text-center">איך נכנסים לקורס?</h2>
                            
                            <div className="space-y-8 mb-12">
                                <div className="flex gap-4 items-start">
                                    <div className="step-number">1</div>
                                    <div>
                                        <h3 className="font-bold text-xl text-[#1B4D3E]">בדקי את הודעות הוואטסאפ שלך</h3>
                                        <p className="text-gray-600">
                                            {formatText("שלחתי לך כרגע הודעה אישית עם פרטי הגישה (שם משתמש וסיסמה). אם לא קיבלת הודעה תוך כמה דקות, וודאי שבדקת את המספר שסיפקת בעת הרכישה.")}
                                        </p>
                                    </div>
                                </div>
                                
                                <div className="flex gap-4 items-start">
                                    <div className="step-number">2</div>
                                    <div>
                                        <h3 className="font-bold text-xl text-[#1B4D3E]">התחברי לפורטל הדיגיטלי</h3>
                                        <p className="text-gray-600">
                                            {formatText("לחצי על הכפתור למטה והזיני את הפרטים שקיבלת בוואטסאפ. משם תוכלי לצפות בכל התוכן מכל מכשיר.")}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <a 
                                href={portalUrl} 
                                className="w-full btn-terracotta py-6 rounded-3xl font-bold text-2xl shadow-2xl flex justify-center items-center gap-4 transition-all hover:scale-[1.02]"
                            >
                                <span>כניסה מיידית לפורטל הקורס</span>
                                <ExternalLink size={28} />
                            </a>
                        </div>

                        {/* Personal Message from Rivka */}
                        <div className="max-w-2xl mx-auto flex flex-col items-center text-center">
                            <div className="relative mb-6">
                                <div className="absolute inset-0 bg-[#B07D62] rounded-full opacity-10 blur-2xl scale-150"></div>
                                <img src="me.jpg" alt="רבקה הולצברג" className="relative w-32 h-32 object-cover rounded-full shadow-lg border-4 border-white" />
                            </div>
                            <div className="text-xl text-[#1B4D3E] leading-relaxed italic">
                                <Quote className="w-8 h-8 text-[#B07D62] opacity-20 inline-block align-top ml-2" />
                                <span>
                                    {formatText("אני כל כך נרגשת לראות אותך בתוך הקורס. השקעתי המון כדי שהמטבח שלך בפסח הזה יהיה מקום של הנאה, בריאות וחירות אמיתית. נתראה בפנים!")}
                                </span>
                                <Quote className="w-8 h-8 text-[#B07D62] opacity-20 inline-block align-bottom mr-2 transform rotate-180" />
                            </div>
                            <div className="mt-6 flex flex-col items-center gap-1">
                                <div className="flex items-center gap-2 text-[#B07D62] font-bold">
                                    <Heart size={18} className="fill-[#B07D62]" />
                                    <span>שלך, רבקה הולצברג</span>
                                </div>
                                <span className="text-gray-400 text-sm tracking-widest uppercase">המטבח הבריא</span>
                            </div>
                        </div>

                        {/* Support Section */}
                        <div className="mt-20 text-center border-t border-gray-200 pt-10 px-4">
                            <p className="text-gray-500 font-light mb-6">נתקלת בקושי טכני בכניסה? אל תדאגי, אני כאן:</p>
                            <a 
                                href={whatsappUrl} 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="btn-whatsapp px-10 py-4 rounded-full font-bold text-lg flex items-center justify-center gap-3 mx-auto max-w-xs shadow-lg"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .004 5.412 0 12.048c0 2.12.54 4.142 1.588 5.946L0 24l6.117-1.604a11.845 11.845 0 005.932 1.577h.005c6.632 0 12.042-5.411 12.045-12.047a11.85 11.85 0 00-3.649-8.525z"/></svg>
                                <span>עזרה טכנית בוואטסאפ</span>
                            </a>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
