<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פסח של חירות | רבקה הולצברג</title>
    
    <!-- React & Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDK (Compat Version for HTML) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        html, body { 
            font-family: 'Rubik', sans-serif; 
            background-color: #F8F9FA; 
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Prevent horizontal wobble */
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }
        
        * {
            box-sizing: border-box;
        }

        .recipe-card:hover .play-btn {
            transform: scale(1.1);
        }

        /* Smooth button transitions */
        .btn-transition {
            transition: all 0.2s ease-in-out;
        }
        
        /* Ensure modal doesn't cause overflow */
        .modal-open {
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyDZWucmMnY-7R2Zvp_iKFjv5MRO2CAvwyI", 
            authDomain: "pesach-course.firebaseapp.com",
            projectId: "pesach-course",
            storageBucket: "pesach-course.firebasestorage.app",
            messagingSenderId: "676161598775",
            appId: "1:676161598775:web:dbc65022457756a128d6b2"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [user, setUser] = useState(null);
            const [hasAccess, setHasAccess] = useState(false);
            const [loading, setLoading] = useState(true);
            const [emailInput, setEmailInput] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [showPassword, setShowPassword] = useState(false);
            const [loginError, setLoginError] = useState("");
            const [selectedVideo, setSelectedVideo] = useState(null);

            const supportLink = "https://wa.me/504207702?text=היי+רבקה";

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
                    if (currentUser) {
                        await verifyAccess(currentUser.email);
                        setUser(currentUser);
                    } else {
                        setUser(null);
                        setHasAccess(false);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            // Refresh icons whenever view changes
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [user, hasAccess, loading, selectedVideo, loginError, showPassword]);

            const verifyAccess = async (email) => {
                if (!email) return;
                setLoading(true);
                try {
                    const cleanEmail = email.trim().toLowerCase();
                    const doc = await db.collection('paid_users').doc(cleanEmail).get();

                    if (doc.exists && doc.data().hasAccess === true) {
                        setHasAccess(true);
                    } else {
                        setHasAccess(false);
                        setLoginError("המייל מחובר אך לא נמצאה הרשאה פעילה לקורס.");
                    }
                } catch (error) {
                    console.error("Access error:", error);
                    setLoginError("שגיאה בבדיקת הרשאות הכניסה.");
                }
                setLoading(false);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError("");
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(emailInput.trim().toLowerCase(), passwordInput);
                } catch (error) {
                    setLoading(false);
                    setLoginError("כתובת המייל או הסיסמה אינם נכונים.");
                }
            };

            const recipes = [
                { id: 1, name: "קרקרים – לנשנוש ולהגשה", vimeoId: "12345678" },
                { id: 2, name: "לחם שקדים – הלחם של כל בוקר", vimeoId: "12345678" },
                { id: 3, name: "לחם לטוסטים – כי מגיע לך טוסט", vimeoId: "12345678" },
                { id: 4, name: "בייגלס – רכים וממכרים", vimeoId: "12345678" },
                { id: 5, name: "פיצה לפסח – קריספית ואמיתית", vimeoId: "12345678" },
                { id: 6, name: "בראוניז – שוקולדיים ועשירים", vimeoId: "12345678" },
                { id: 7, name: "חיתוכיות פקאן", vimeoId: "12345678" },
                { id: 8, name: "חיתוכיות שוקולד אגוזים", vimeoId: "12345678" },
                { id: 9, name: "עוגיות שוקולד צ'יפס", vimeoId: "12345678" },
                { id: 10, name: "כדורי קפוצ'ינו בציפוי שוקולד", vimeoId: "12345678" },
                { id: 11, name: "עוגת מוס שוקולד", vimeoId: "12345678" },
                { id: 12, name: "פאי תפוחים מפנק", vimeoId: "12345678" }
            ];

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#F8F9FA] text-[#1B4D3E] px-4 text-center">
                        <div className="w-10 h-10 border-4 border-[#B07D62] border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-lg font-bold">טוען את עולם החירות...</p>
                    </div>
                );
            }

            if (!user || !hasAccess) {
                return (
                    <div className="min-h-screen bg-[#F8F9FA] flex flex-col items-center justify-center p-4">
                        <div className="w-full max-w-md bg-white rounded-[32px] md:rounded-[40px] shadow-xl p-6 md:p-10 border-b-8 border-[#B07D62] relative">
                            <div className="text-center mb-8">
                                <div className="inline-flex p-3 bg-[#B07D62]/10 rounded-full text-[#B07D62] mb-4">
                                    <i data-lucide="lock" className="w-8 h-8"></i>
                                </div>
                                <h1 className="text-2xl md:text-3xl font-bold text-[#1B4D3E]">כניסה לקורס פסח</h1>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-5">
                                <div className="space-y-2 text-right">
                                    <label className="flex items-center gap-2 text-[#1B4D3E] font-bold text-sm mr-1">
                                        <i data-lucide="mail" className="w-4 h-4"></i>
                                        <span>כתובת אימייל</span>
                                    </label>
                                    <input 
                                        type="email"
                                        inputMode="email"
                                        required
                                        value={emailInput}
                                        onChange={(e) => setEmailInput(e.target.value)}
                                        className="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-[#B07D62] outline-none transition-all text-left"
                                        dir="ltr"
                                    />
                                </div>

                                <div className="space-y-2 text-right">
                                    <label className="flex items-center gap-2 text-[#1B4D3E] font-bold text-sm mr-1">
                                        <i data-lucide="key-round" className="w-4 h-4"></i>
                                        <span>סיסמה</span>
                                    </label>
                                    <div className="relative">
                                        <input 
                                            type={showPassword ? "text" : "password"}
                                            required
                                            value={passwordInput}
                                            onChange={(e) => setPasswordInput(e.target.value)}
                                            className="w-full pr-5 pl-12 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-[#B07D62] outline-none transition-all text-left"
                                            dir="ltr"
                                        />
                                        <button 
                                            type="button"
                                            onClick={() => setShowPassword(!showPassword)}
                                            className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#B07D62]"
                                        >
                                            {showPassword ? <i data-lucide="eye-off" className="w-5 h-5"></i> : <i data-lucide="eye" className="w-5 h-5"></i>}
                                        </button>
                                    </div>
                                </div>

                                {loginError && (
                                    <div className="p-4 bg-red-50 text-red-600 rounded-xl text-sm font-medium border border-red-100 text-center">
                                        {loginError}
                                    </div>
                                )}

                                <button className="w-full bg-gradient-to-r from-[#B07D62] to-[#d19a7e] text-white font-bold py-4 md:py-5 rounded-2xl shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2 mt-2">
                                    <span>התחברי לקורס</span>
                                    <i data-lucide="arrow-left" className="w-5 h-5"></i>
                                </button>
                            </form>

                            <div className="mt-8 text-center border-t border-gray-100 pt-6">
                                <a href={supportLink} target="_blank" className="text-[#B07D62] font-bold hover:underline inline-flex items-center gap-2">
                                    <i data-lucide="message-circle" className="w-5 h-5"></i>
                                    <span>זקוקה לעזרה? פני לתמיכה</span>
                                </a>
                            </div>
                        </div>
                        <div className="mt-8 text-gray-400 font-bold uppercase tracking-widest text-[10px] flex items-center gap-2">
                            <i data-lucide="leaf" className="w-3 h-3"></i>
                            <span>רבקה הולצברג | המטבח הבריא</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#F8F9FA] text-[#333] pb-24 relative w-full overflow-x-hidden">
                    <header className="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm w-full">
                        <div className="max-w-7xl mx-auto px-4 h-16 md:h-20 flex items-center justify-between">
                            <div className="flex items-center gap-2 md:gap-3">
                                <div className="w-8 h-8 md:w-10 md:h-10 bg-[#1B4D3E] rounded-lg md:rounded-xl flex items-center justify-center text-white">
                                    <i data-lucide="leaf" className="w-5 h-5 md:w-6 md:h-6"></i>
                                </div>
                                <span className="font-bold text-[#1B4D3E] text-sm md:text-lg italic leading-tight">פסח של חירות</span>
                            </div>
                            <div className="flex items-center gap-2 md:gap-4">
                                <div className="hidden xs:flex flex-col items-end">
                                    <span className="text-[10px] text-gray-400">ברוכה הבאה,</span>
                                    <span className="text-xs font-bold text-[#1B4D3E] truncate max-w-[100px]">{user.email}</span>
                                </div>
                                <button onClick={() => auth.signOut()} className="p-2 text-gray-400 hover:text-red-500 transition-colors">
                                    <i data-lucide="log-out" className="w-6 h-6"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 pt-8 md:pt-12">
                        <div className="mb-8 md:mb-12 text-right">
                            <h1 className="text-3xl md:text-5xl font-bold text-[#1B4D3E] mb-3">איזה כיף שאת כאן! 🌿</h1>
                            <p className="text-lg md:text-xl text-gray-600 max-w-2xl leading-relaxed">הנה כל המתכונים והסרטונים שיעשו לך את הפסח בריא וטעים באמת.</p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
                            {/* Sidebar / Top actions on mobile */}
                            <div className="lg:col-span-4 order-2 lg:order-1 space-y-4 md:space-y-6">
                                <div className="bg-white p-6 md:p-8 rounded-[32px] md:rounded-[40px] shadow-sm border-b-4 border-[#B07D62]">
                                    <h3 className="text-xl md:text-2xl font-bold text-[#1B4D3E] mb-5 flex items-center gap-2">
                                        <i data-lucide="file-text" className="text-[#B07D62] w-6 h-6"></i>
                                        עזרי הכנה
                                    </h3>
                                    <div className="space-y-3">
                                        <button className="w-full flex items-center justify-between p-4 bg-gray-50 rounded-2xl group hover:bg-[#B07D62] hover:text-white transition-all font-bold text-sm">
                                            <span>רשימת הצטיידות מלאה</span>
                                            <i data-lucide="download" className="w-5 h-5"></i>
                                        </button>
                                        <button className="w-full flex items-center justify-between p-4 bg-gray-50 rounded-2xl group hover:bg-[#B07D62] hover:text-white transition-all font-bold text-sm">
                                            <span>המדריך למטבח בריא</span>
                                            <i data-lucide="download" className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>
                                <div className="bg-[#1B4D3E] p-6 md:p-8 rounded-[32px] md:rounded-[40px] text-white shadow-xl">
                                    <div className="flex items-center gap-3 mb-4">
                                        <i data-lucide="heart" className="text-[#D4AF37] fill-[#D4AF37] w-6 h-6"></i>
                                        <h3 className="text-xl md:text-2xl font-bold">מתנה בשבילך</h3>
                                    </div>
                                    <p className="text-green-50/80 mb-6 italic text-sm">חוברת דיגיטלית עם 80+ מתכונים לכל השנה:</p>
                                    <button className="w-full bg-[#D4AF37] hover:bg-[#B7950B] text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2 active:scale-95">
                                        <i data-lucide="download" className="w-5 h-5"></i>
                                        <span>הורדת החוברת הדיגיטלית</span>
                                    </button>
                                </div>
                            </div>

                            {/* Main Content: Recipes */}
                            <div className="lg:col-span-8 order-1 lg:order-2">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6">
                                    {recipes.map((recipe) => (
                                        <div key={recipe.id} className="bg-white rounded-[24px] md:rounded-[32px] overflow-hidden shadow-sm border border-gray-100 hover:shadow-md transition-all group recipe-card">
                                            <div className="aspect-video bg-gray-100 relative overflow-hidden cursor-pointer" onClick={() => setSelectedVideo(recipe)}>
                                                <div className="absolute inset-0 flex items-center justify-center">
                                                    <div className="bg-white/90 p-3 md:p-4 rounded-full shadow-lg play-btn transition-transform">
                                                        <i data-lucide="play" className="text-[#B07D62] w-6 h-6 md:w-8 md:h-8" style={{fill: '#B07D62'}}></i>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="p-5 md:p-6 flex items-center justify-between gap-2">
                                                <h4 className="font-bold text-[#1B4D3E] text-base md:text-lg leading-snug">{recipe.name}</h4>
                                                <button onClick={() => setSelectedVideo(recipe)} className="text-[#B07D62] font-bold text-xs md:text-sm hover:underline shrink-0">לצפייה</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Video Modal */}
                    {selectedVideo && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm" onClick={() => setSelectedVideo(null)}>
                            <div className="w-full max-w-4xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 text-white">
                                    <h3 className="text-lg md:text-xl font-bold truncate max-w-[80%]">{selectedVideo.name}</h3>
                                    <button onClick={() => setSelectedVideo(null)} className="text-3xl font-bold hover:text-[#B07D62] leading-none">×</button>
                                </div>
                                <div className="aspect-video bg-black rounded-2xl md:rounded-3xl overflow-hidden shadow-2xl border-2 border-white/10 flex items-center justify-center text-white flex-col gap-4">
                                    <i data-lucide="video" className="text-[#B07D62] w-12 h-12"></i>
                                    <p className="text-lg px-4 text-center">כאן יופיע הסרטון של {selectedVideo.name}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Floating Support Button - Mobile Friendly */}
                    <div className="fixed bottom-6 left-6 z-40">
                        <a href={supportLink} target="_blank" className="flex items-center gap-3 bg-[#25D366] text-white p-4 md:px-6 md:py-4 rounded-full shadow-2xl hover:scale-105 active:scale-95 transition-all group">
                            <span className="font-bold hidden md:inline">תמיכה בוואטסאפ</span>
                            <i data-lucide="message-circle" className="w-6 h-6 md:w-7 md:h-7"></i>
                        </a>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
