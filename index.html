                if (!hasCustomMenu) return [];
                const selectedRecipes = recipesList.filter(r => savedRecipes.includes(r.id));
                const aggregated = {};
                
                selectedRecipes.forEach(recipe => {
                    recipe.ingredients.forEach(ing => {
                        const matchMeasure = ing.match(/^([\d.]+)\s*(גרם|מ״ל)\s*(?:\(.*?\))?\s*(.+)$/);
                        let amount = 0;
                        let unit = '';
                        let name = ing.trim();
                        let original = ing;

                        if (matchMeasure) {
                            amount = parseFloat(matchMeasure[1]);
                            unit = matchMeasure[2];
                            name = matchMeasure[3].trim();
                        } else if (ing.match(/^([\d]+)\s*ביצי/)) {
                            amount = parseInt(ing.match(/^([\d]+)\s*ביצי/)[1]);
                            unit = "יחידות";
                            name = "ביצים";
                        } else if (ing.includes("1 ביצה") || ing.includes("ביצה אחת")) {
                            amount = 1;
                            unit = "יחידות";
                            name = "ביצים";
                        } else if (ing.match(/^([\d]+)\s*תפוחי/)) {
                            amount = parseInt(ing.match(/^([\d]+)\s*תפוחי/)[1]);
                            unit = "יחידות";
                            name = "תפוחים";
                        } else {
                            let cleanName = ing.replace(/^[\d½/.-]+\s*(כף|כפות|כפית|כפיות|כוס|כוסות)\s*/, "").trim();
                            if(cleanName.startsWith("של ")) cleanName = cleanName.substring(3).trim();
                            name = cleanName;
                            amount = 0; 
                        }

                        if (!aggregated[name]) {
                            aggregated[name] = { amount: 0, unit: unit, items: new Set() };
                        }
                        
                        if (amount > 0 && (aggregated[name].unit === unit || aggregated[name].unit === '')) {
                            aggregated[name].amount += amount;
                            aggregated[name].unit = unit;
                        } else {
                            aggregated[name].items.add(original);
                        }
                    });
                });

                    amount: aggregated[key].amount,
                    unit: aggregated[key].unit,

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12 print-grid-2">
                                {generalIngredientsData.map((cat, i) => (
                                    <div key={i}>
                                        <h3 className="text-xl font-bold text-[#B07D62] border-b pb-3 mb-4">{cat.category}</h3>
                                        <div className="space-y-4">
                                            {cat.items.map((item, j) => {
                                                const uniqueKey = `gen-${item}`;
                                                const isChecked = checkedItems.includes(uniqueKey);
                                                return (
                                                    <div key={j} onClick={() => toggleItem(uniqueKey)} className={`check-item flex items-center gap-3 text-lg ${isChecked ? 'checked' : ''}`}>
                                                        <div className={`w-7 h-7 border-2 rounded shrink-0 flex items-center justify-center transition ${isChecked ? 'bg-[#1B4D3E] border-[#1B4D3E]' : 'border-gray-300'}`}>
                                                            {isChecked && <LucideIcon name="check" className="text-white w-5 h-5" />}
                                                        </div>
                                                        <span className="font-medium text-gray-800">{item}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-[#1B4D3E]/5 p-6 md:p-10 rounded-3xl border border-[#1B4D3E]/10">
                                <div className="mb-8 flex items-center gap-3 text-[#1B4D3E] bg-white p-4 rounded-2xl shadow-sm border border-gray-100 no-print">
                                    <LucideIcon name="sparkles" className="shrink-0 text-[#D4AF37]" size="28" />
                                    <p className="font-bold text-lg leading-tight">
                                        חיברנו עבורך את הכמויות של כל המתכונים שהוספת לרשימה. ככה קונים חכם!
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6 print-grid-2">
                                    {combinedList.map((ing, j) => {
                                        const uniqueKey = `comb-${ing.name}`;
                                        const isChecked = checkedItems.includes(uniqueKey);
                                        
                                        let displayStr = ing.name;
                                        if (ing.amount > 0) {
                                            displayStr = `${ing.amount} ${ing.unit} ${ing.name}`;
                                        }
                                        const extras = ing.items.length > 0 ? `(+ ${ing.items.join(', ')})` : '';

                                        return (
                                            <div key={j} onClick={() => toggleItem(uniqueKey)} className={`check-item flex items-start gap-4 text-xl ${isChecked ? 'checked opacity-50' : ''}`}>
                                                <div className={`w-8 h-8 border-2 rounded-lg shrink-0 flex items-center justify-center mt-1 transition-all ${isChecked ? 'bg-[#1B4D3E] border-[#1B4D3E]' : 'border-gray-300 bg-white'}`}>
                                                    {isChecked && <LucideIcon name="check" className="text-white w-5 h-5" />}
                                                </div>
                                                <div className="flex flex-col">
                                                    <span className="font-medium text-gray-800">{displayStr}</span>
                                                    {extras && <span className="text-sm text-gray-500 mt-1 leading-snug">{extras}</span>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [user, setUser] = useState(null); 
            const [hasAccess, setHasAccess] = useState(false); 
            const [loading, setLoading] = useState(true); 
            const [view, setView] = useState('home'); 
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            const [emailInput, setEmailInput] = useState(localStorage.getItem('savedEmail') || "");
            const [passwordInput, setPasswordInput] = useState("");
            const [loginError, setLoginError] = useState("");

            const [savedRecipes, setSavedRecipes] = useState(JSON.parse(localStorage.getItem('saves') || '[]'));
            const [doneRecipes, setDoneRecipes] = useState(JSON.parse(localStorage.getItem('done') || '[]'));
            const [recipeNotes, setRecipeNotes] = useState(JSON.parse(localStorage.getItem('notes') || '{}'));
            const [checkedItems, setCheckedItems] = useState(JSON.parse(localStorage.getItem('checkedItems') || '[]'));
            
            const [searchQuery, setSearchQuery] = useState("");
            const [categoryFilter, setCategoryFilter] = useState("הכל");

            const supportLink = "https://wa.me/504207702?text=היי+רבקה+יקירה,+יש+לי+שאלה+לגבי+הקורס";

            const previewMode = false; // הגדרת אבטחה מופעלת

            useEffect(() => {
                let wakeLock = null;
                const requestWakeLock = async () => {
                    if (view === 'recipe' && 'wakeLock' in navigator) {
                        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
                    }
                };
                requestWakeLock();
                return () => { if (wakeLock) wakeLock.release().then(() => wakeLock = null); };
            }, [view]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            useEffect(() => {
                auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
                    return auth.onAuthStateChanged(async (u) => {
                        if (u) {
                            const cleanEmail = u.email.toLowerCase();
                            const doc = await db.collection('paid_users').doc(cleanEmail).get();
                            if (doc.exists && doc.data().hasAccess) {
                                setHasAccess(true);
                                setUser(u);
                            } else { auth.signOut(); }
                        } else {
                            setUser(null);
                            setHasAccess(false);
                        }
                        setLoading(false);
                    });
                });
            }, []);

            useEffect(() => {
                localStorage.setItem('saves', JSON.stringify(savedRecipes));
                localStorage.setItem('done', JSON.stringify(doneRecipes));
                localStorage.setItem('notes', JSON.stringify(recipeNotes));
                localStorage.setItem('checkedItems', JSON.stringify(checkedItems));
            }, [savedRecipes, doneRecipes, recipeNotes, checkedItems]);

            useEffect(() => {
                const handleScroll = () => { if (isMenuOpen) setIsMenuOpen(false); };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, [isMenuOpen]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(emailInput.trim().toLowerCase(), passwordInput);
                    localStorage.setItem('savedEmail', emailInput);
                } catch (err) {
                    setLoginError("פרטי הכניסה אינם נכונים.");
                    setLoading(false);
                }
            };

            const handleLogout = () => {
                auth.signOut().then(() => {
                    setUser(null);
                    setHasAccess(false);
                    setView('home');
                });
            };

            const filteredRecipes = useMemo(() => {
                return recipesList.filter(r => {
                    const matchesSearch = r.name.toLowerCase().includes(searchQuery.toLowerCase());
                    
                    let matchesCategory = true;
                    if (categoryFilter === "הרשימה שלי") matchesCategory = savedRecipes.includes(r.id);
                    else if (categoryFilter === "הכנתי") matchesCategory = doneRecipes.includes(r.id);
                    else if (categoryFilter !== "הכל") matchesCategory = r.category === categoryFilter;

                    return matchesSearch && matchesCategory;
                });
            }, [searchQuery, categoryFilter, savedRecipes, doneRecipes]);

            const progress = (doneRecipes.length / recipesList.length) * 100;

            if (loading && !previewMode) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#F8F9FA]">
                    <div className="w-10 h-10 border-4 border-[#B07D62] border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-bold text-[#1B4D3E]">מכינה את המטבח שלך...</p>
                </div>
            );

            if (!previewMode && (!user || !hasAccess)) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-[#F8F9FA]">
                    <div className="w-full max-w-md bg-white p-10 rounded-[40px] shadow-xl border-b-8 border-[#B07D62]">
                        <div className="text-center mb-8">
                             <div className="inline-flex p-4 bg-[#B07D62]/10 rounded-full text-[#B07D62] mb-4">
                                <LucideIcon name="lock" size="32" />
                             </div>
                             <h1 className="text-3xl font-bold text-[#1B4D3E]">כניסה לפורטל פסח</h1>
                             <p className="text-gray-400 mt-2">הזיני פרטים כדי להתחיל לבשל בחירות</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div className="space-y-2 text-right">
                                <label className="block font-bold text-sm mr-1">כתובת מייל</label>
                                <div className="relative">
                                    <input type="email" value={emailInput} onChange={e => setEmailInput(e.target.value)} className="w-full p-4 pr-12 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#B07D62]" required />
                                    <LucideIcon name="mail" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400" size="18" />
                                </div>
                            </div>
                            <div className="space-y-2 text-right">
                                <label className="block font-bold text-sm mr-1">סיסמה</label>
                                <div className="relative">
                                    <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full p-4 pr-12 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#B07D62]" required />
                                    <LucideIcon name="key-round" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400" size="18" />
                                </div>
                            </div>
                            {loginError && <p className="text-red-500 text-sm text-center font-bold">{loginError}</p>}
                            <button className="w-full bg-[#B07D62] text-white py-5 rounded-2xl font-bold text-xl shadow-lg hover:scale-[1.02] transition">התחברי לקורס</button>
                        </form>
                    </div>
                    <p className="mt-8 text-gray-400 font-bold uppercase tracking-widest text-xs italic">רבקה הולצברג | המטבח הבריא</p>
                </div>
            );

            return (
                <div className="portal-wrapper min-h-screen">
                    <header className="bg-white border-b sticky top-0 z-50 h-24 flex items-center no-print shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 w-full flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="relative">
                                    <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="px-5 py-2 bg-[#F8F9FA] text-[#1B4D3E] hover:bg-gray-100 rounded-xl font-bold text-lg flex items-center gap-3 border">
                                        <LucideIcon name={isMenuOpen ? "x" : "menu"} />
                                        <span>מה תרצי להכין?</span>
                                    </button>
                                    {isMenuOpen && (
                                        <div className="absolute top-full right-0 mt-3 bg-white shadow-2xl rounded-[35px] border w-80 p-6 z-[100] text-right">
                                            <button onClick={() => { setView('home'); setIsMenuOpen(false); }} className="w-full p-4 hover:bg-gray-50 rounded-2xl font-bold flex items-center justify-between text-xl text-[#1B4D3E]"><span>דף הבית</span> <LucideIcon name="home" /></button>
                                            <button onClick={() => { setView('shopping'); setIsMenuOpen(false); }} className="w-full p-4 hover:bg-gray-50 rounded-2xl font-bold flex items-center justify-between text-xl text-[#1B4D3E]"><span>רשימת מצרכים</span> <LucideIcon name="shopping-bag" /></button>
                                            <div className="h-px bg-gray-100 my-4"></div>
                                            <div className="max-h-60 overflow-y-auto pr-2">
                                                {recipesList.map(r => <button key={r.id} onClick={() => { setSelectedRecipe(r); setView('recipe'); setIsMenuOpen(false); }} className="w-full text-right p-3 hover:bg-gray-50 rounded-xl text-lg flex items-center justify-between text-gray-600"><span>{r.name}</span> <LucideIcon name="chevron-left" className="w-4 h-4" /></button>)}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <span className="font-bold text-[#1B4D3E] text-2xl italic hidden md:block">פסח של חירות</span>
                            </div>
                            <button onClick={handleLogout} className="p-3 text-gray-400 hover:text-red-500 transition-all"><LucideIcon name="log-out" className="w-8 h-8" /></button>
                        </div>
                    </header>

                    <main>
                        {view === 'home' && <HomeView 
                            searchQuery={searchQuery} setSearchQuery={setSearchQuery}
                            categoryFilter={categoryFilter} setCategoryFilter={setCategoryFilter}
                            filteredRecipes={filteredRecipes}
                            savedRecipes={savedRecipes} setSavedRecipes={setSavedRecipes}
                            doneRecipes={doneRecipes} setDoneRecipes={setDoneRecipes}
                            setView={setView} setSelectedRecipe={setSelectedRecipe}
                            progress={progress}
                        />}
                        {view === 'recipe' && <RecipeView 
                            r={selectedRecipe} setView={setView} 
                            recipeNotes={recipeNotes} setRecipeNotes={setRecipeNotes}
                            doneRecipes={doneRecipes} setDoneRecipes={setDoneRecipes}
                        />}
                        {view === 'shopping' && <IngredientsView 
                            setView={setView} 
                            checkedItems={checkedItems} setCheckedItems={setCheckedItems} 
                            savedRecipes={savedRecipes}
                        />}
                    </main>

                    <footer className="mt-12 py-8 mb-24 border-t border-gray-200 text-center text-gray-400 text-sm px-4 no-print">
                        <p className="font-bold mb-2 text-[#B07D62]">כל הזכויות שמורות לרבקה הולצברג © 2026 | המטבח הבריא</p>
                        <p className="max-w-2xl mx-auto leading-relaxed">התוכן, המתכונים והסרטונים נועדו לשימוש אישי של רוכשת הקורס בלבד. אין להעתיק, לשכפל, להפיץ או להעביר לצד ג' בכל דרך שהיא ללא אישור בכתב.</p>
                    </footer>

                    <div className="fixed bottom-6 left-6 z-40 no-print">
                        <a href={supportLink} target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 bg-[#25D366] text-white px-5 py-3 rounded-full shadow-lg hover:scale-105 transition-all border-2 border-white">
                            <LucideIcon name="message-circle" className="w-6 h-6" />
                            <span className="font-bold text-base">רבקה, יש לי שאלה</span>
                        </a>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
