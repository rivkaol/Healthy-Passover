                            {shoppingData.map((cat, i) => (
                                <div key={i}>
                                    <h3 className="text-xl font-bold text-[#B07D62] border-b pb-3 mb-4">{cat.category}</h3>
                                    <ul className="space-y-3">
                                        {cat.items.map((item, j) => (
                                            <li key={j} className="flex items-center gap-3 text-lg text-gray-700">
                                                <div className="w-5 h-5 border-2 border-gray-200 rounded shrink-0"></div> {item}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => window.print()} className="mt-12 w-full btn-terracotta py-4 rounded-xl font-bold text-lg no-print shadow-md">הדפסת רשימת הקניות</button>
                    </div>
                </div>
            );

            return (
                <div className="portal-wrapper min-h-screen">
                    <header className="bg-white border-b border-gray-100 sticky top-0 z-50 w-full no-print h-20 flex items-center shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 w-full flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="relative">
                                    <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="flex items-center gap-3 px-4 py-2 bg-[#F8F9FA] text-[#1B4D3E] hover:bg-gray-100 rounded-xl transition-all border border-gray-100">
                                        <i data-lucide={isMenuOpen ? "x" : "menu"} className="w-6 h-6"></i>
                                        <span className="font-bold text-lg">מה תרצי לעשות?</span>
                                    </button>
                                    
                                    {isMenuOpen && (
                                        <div className="absolute top-full right-0 mt-2 bg-white shadow-2xl rounded-3xl border border-gray-100 w-80 p-4 z-[100]">
                                            <button onClick={() => { setView('home'); setIsMenuOpen(false); setFilterSaved(false); }} className="w-full text-right p-4 hover:bg-[#F8F9FA] rounded-2xl font-bold text-[#1B4D3E] flex items-center justify-between mb-2">
                                                <span>דף הבית של הקורס</span> <i data-lucide="home" className="w-5 h-5"></i>
                                            </button>
                                            <button onClick={() => { setView('shopping'); setIsMenuOpen(false); }} className="w-full text-right p-4 hover:bg-[#F8F9FA] rounded-2xl font-bold text-[#1B4D3E] flex items-center justify-between mb-2">
                                                <span>רשימת הצטיידות</span> <i data-lucide="shopping-bag" className="w-5 h-5"></i>
                                            </button>
                                            <div className="h-px bg-gray-100 my-2"></div>
                                            <p className="text-[10px] font-bold text-gray-400 px-4 mb-2 uppercase tracking-widest">שיעורי הקורס</p>
                                            <div className="max-h-64 overflow-y-auto pr-1">
                                                {recipesList.map(r => (
                                                    <button key={r.id} onClick={() => { setSelectedRecipe(r); setView('recipe'); setIsMenuOpen(false); }} className="w-full text-right p-3 hover:bg-gray-50 rounded-xl text-base text-gray-600 flex items-center justify-between">
                                                        <span>{r.name}</span> <i data-lucide="chevron-left" className="w-3 h-3"></i>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <span className="font-bold text-[#1B4D3E] text-xl italic whitespace-nowrap hidden xs:inline">פסח של חירות</span>
                            </div>
                            <button onClick={() => { auth.signOut(); setUser(null); }} className="p-2 text-gray-400 hover:text-red-500"><i data-lucide="log-out" className="w-6 h-6"></i></button>
                        </div>
                    </header>

                    <main className="container-fluid">
                        {view === 'home' && <HomeView />}
                        {view === 'recipe' && <RecipeView r={selectedRecipe} />}
                        {view === 'shopping' && <ShoppingView />}
                    </main>

                    <div className="fixed bottom-6 left-6 z-40 no-print">
                        <a href={supportLink} target="_blank" className="flex items-center gap-3 bg-[#25D366] text-white px-4 py-2 rounded-full shadow-lg hover:scale-105 transition-all opacity-90 border border-white">
                            <i data-lucide="message-circle" className="w-5 h-5"></i>
                            <span className="font-bold text-sm">רבקה, יש לי שאלה</span>
                        </a>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
