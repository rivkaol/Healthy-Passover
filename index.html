</head>

        // --- Custom Icons Components ---
        const LucideIcon = ({ name, className = "", size }) => {
            const spanRef = React.useRef(null);
            React.useEffect(() => {
                if (spanRef.current && window.lucide && name) {
                    const sizeAttr = size ? `width="${size}" height="${size}"` : '';
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" ${sizeAttr}></i>`;
                    window.lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className, size]);
            return <span ref={spanRef} className="contents"></span>;
        };

        const BookmarkIcon = ({ active }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill={active ? "#3b82f6" : "none"} stroke={active ? "#3b82f6" : "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={active ? "bookmark-active" : "text-gray-400"}><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        );
        const CheckIcon = ({ active }) => (

        );

        // --- Data Definitions ---
        const recipesList = [
            { id: 1, name: "קרקרים – לנשנוש ולהגשה", img: "a.jpg", time: "15 דק'", category: "נשנושים", description: "קרקרים פריכים ומזינים על בסיס שקדים וזרעים.", tips: ["אפשר להוסיף זעתר או מלח גס מעל לפני האפייה.", "כדאי לרדד הכי דק שאפשר לקבלת קראנץ' מושלם."], ingredients: ["2 כוסות קמח שקדים", "1/2 כוס שומשום", "1/4 כוס גרעיני חמניה", "1 כפית מלח", "1 ביצה"], vimeoId: "1175446208", vimeoHash: "542cc8650c" },
            { id: 2, name: "לחם שקדים – הלחם של כל בוקר", img: "b.jpg", time: "40 דק'", category: "לחמים", description: "הלחם המפורסם שלנו. רך, משביע ונטול גלוטן לחלוטין.", tips: ["אחרי האפייה, תני לו להתקרר לגמרי לפני הפריסה.", "מתאים מאוד להקפאה כפרוסות."], ingredients: ["3 כוסות קמח שקדים", "1/2 כוס זרעי פשתן טחונים", "4 ביצים", "1 כפית סודה לשתייה"], vimeoId: "1175146910", vimeoHash: "611ca822f6" },
            { id: 3, name: "לחם לטוסטים", img: "c.jpg", time: "35 דק'", category: "לחמים", description: "מתכון ייעודי ללחם שנפרס מושלם ועובר קלייה נהדרת.", tips: ["חשוב להשתמש בתבנית אינגליש קייק צרה."], ingredients: ["2.5 כוסות קמח שקדים", "1/4 כוס טחינה גולמית", "3 ביצים", "1/2 כוס מים"], vimeoId: "1175225344", vimeoHash: "6c23bce099" },
            { id: 4, name: "בייגלס רכים וממכרים", img: "d.jpg", time: "25 דק'", category: "לחמים", description: "בייגלס אמיתיים עם חור באמצע, רכים מבפנים.", tips: ["הרטבת הידיים עוזרת לעצב את הצורה בקלות."], ingredients: ["2 כוסות קמח שקדים", "1 כוס גבינת מוצרלה", "1 ביצה", "אבקת אפייה"], vimeoId: "1175222098", vimeoHash: "d5491ae49d" },
            { id: 5, name: "פיצה לפסח קריספית", img: "e.jpg", time: "20 דק'", category: "לחמים", description: "בצק פיצה דק וקריספי שלא תאמיני שהוא כשר.", tips: ["חממי את התנור למקסימום לפני ההכנסה."], ingredients: ["1.5 כוסות קמח שקדים", "1 ביצה", "אורגנו", "רוטב עגבניות", "גבינה"], vimeoId: "1175226753", vimeoHash: "d4641ba914" },
            { id: 6, name: "בראוניז שוקולדיים", img: "f.jpg", time: "30 דק'", category: "מתוקים", description: "בראוניז נימוחים, שוקולדיים מאוד ומתוקים בדיוק.", tips: ["הסוד הוא לא לאפות דקה אחת יותר מדי."], ingredients: ["200 גרם שוקולד מריר", "1/2 כוס שמן קוקוס", "3 ביצים", "1 כוס קמח שקדים"], vimeoId: "1175446742", vimeoHash: "e6d5e3413f" },
            { id: 7, name: "חיתוכיות פקאן", img: "g.jpg", time: "25 דק'", category: "מתוקים", description: "ריבועי אנרגיה עשירים בפקאן ודבש.", tips: ["לחתוך לריבועים קטנים - זה מאוד עשיר."], ingredients: ["2 כוסות פקאנים", "1/2 כוס קמח שקדים", "1/4 כוס סילאן"], vimeoId: "1175788503", vimeoHash: "58f8fd0031" },
            { id: 8, name: "חיתוכיות שוקולד אגוזים", img: "h.jpg", time: "20 דק'", category: "מתוקים", description: "קינוח ללא אפייה המשלב אגוזים ושוקולד.", tips: ["לשמור תמיד במקפיא ולהוציא רגע לפני ההגשה."], ingredients: ["שוקולד מריר", "אגוזי מלך", "חמאת שקדים"], vimeoId: "1175225931", vimeoHash: "4eb5141879" },
            { id: 9, name: "עוגיות שוקולד צ'יפס", img: "i.jpg", time: "12 דק'", category: "מתוקים", description: "העוגיות הקלאסיות בגרסה הבריאה שלנו.", tips: ["הן מתקשות רק אחרי שהן מתקררות."], ingredients: ["2 כוסות קמח שקדים", "1/2 כוס נטיפי שוקולד", "1/4 כוס שמן קוקוס"], vimeoId: "1175223837", vimeoHash: "66084946b3" },
            { id: 10, name: "כדורי קפוצ'ינו", img: "j.jpg", time: "15 דק'", category: "מתוקים", description: "כדורי אנרגיה בטעם קפה מצופים שוקולד.", tips: ["ניתן לצפות בקוקוס טחון במקום שוקולד."], ingredients: ["תמרים", "קמח שקדים", "אבקת קפה נמס"], vimeoId: "1175227091", vimeoHash: "" },
            { id: 11, name: "עוגת מוס שוקולד", img: "k.jpg", time: "45 דק'", category: "מתוקים", description: "עוגה מרשימה לאירוח. בסיס שוקולדי ומוס עשיר.", tips: ["דורש קירור של לפחות 6 שעות."], ingredients: ["ביצים", "שוקולד מריר", "קרם קוקוס", "קמח שקדים"], vimeoId: "1175226254", vimeoHash: "ac5a84b967" },
            { id: 12, name: "פאי תפוחים מפנק", img: "l.jpg", time: "50 דק'", category: "מתוקים", description: "בצק פריך במילוי תפוחים מקורמלים.", tips: ["לבחור תפוחים חמוצים (גראני סמית)."], ingredients: ["תפוחים ירוקים", "קינמון", "קמח שקדים", "ביצה"], vimeoId: "1175147462", vimeoHash: "0db260320f" },
            { id: 13, name: "טראפלס שוקולד", img: "m.jpg", time: "15 דק'", category: "מתוקים", description: "טראפלס שוקולד עשירים שנימוחים בפה.", tips: ["מומלץ לגלגל באבקת קקאו איכותית או קוקוס טחון לפני ההגשה."], ingredients: ["שוקולד מריר", "קרם קוקוס", "קקאו לציפוי"], vimeoId: "1175220851", vimeoHash: "cb3e1e714e" }
        ];

            { category: "קמחים ואגוזים", items: ["קמח שקדים", "אגוזים", "אגוזים טחונים", "אגוזים קצוצים", "אגוזי פקאן"] },
            { category: "שומנים וממרחים", items: ["חמאת שקדים / חמאת אגוזים", "שמן קוקוס", "קרם קוקוס"] },
            { category: "מתוקים", items: ["ממתיק", "תמרים", "שוקולד מריר איכותי", "קקאו"] },
            { category: "נוזלים", items: ["מים", "חלב צמחי", "מיץ לימון", "מיץ תפוזים"] },
            { category: "פירות", items: ["תפוחים"] },
            { category: "תבלינים ותוספות", items: ["מלח", "קינמון", "תמצית וניל", "אבקת אפייה", "קפה", "תבלינים"] },
            { category: "מוצרי בסיס", items: ["ביצים", "יוגורט", "קוטג’"] },

            { category: "תוספות", items: ["פטריות", "זיתים", "בצל", "עגבניות"] }

            authDomain: "pesach-course.firebaseapp.com",
            projectId: "pesach-course",
            storageBucket: "pesach-course.firebasestorage.app",
            messagingSenderId: "676161598775",
            appId: "1:676161598775:web:dbc65022457756a128d6b2"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Extracted Components ---

        const HomeView = ({ 
            searchQuery, setSearchQuery, 
            categoryFilter, setCategoryFilter,
            filteredRecipes, 
            savedRecipes, setSavedRecipes,
            doneRecipes, setDoneRecipes,
            setView, setSelectedRecipe,

        }) => {
            
            const statusFilters = [

            return (

                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">

                                />
                                <LucideIcon name="search" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400" />
                            </div>

                            <div className="flex flex-col gap-3 no-print">
                                <div className="flex flex-wrap gap-2">
                                    {statusFilters.map(cat => (
                                        <button key={cat.id} onClick={() => setCategoryFilter(cat.id)}

                                        <div className="aspect-[4/3] bg-gray-100 overflow-hidden relative">
                                            <img src={r.img} alt={r.name} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" />
                                            {doneRecipes.includes(r.id) && <div className="absolute top-0 right-0 bg-[#10b981] text-white px-4 py-1 font-bold text-xs rounded-bl-2xl shadow-md flex items-center gap-1"><LucideIcon name="check" className="w-3 h-3" /> הכנתי</div>}
                                        </div>
                                        <div className="p-8 text-right flex-grow flex flex-col justify-between">
                                            <div>
                                                <h4 className="font-bold text-[#1B4D3E] text-2xl mb-2 leading-tight">{r.name}</h4>
                                                <p className="text-sm text-gray-500 mb-4 line-clamp-2">{r.description}</p>
                                            </div>
                                            <div className="flex items-center justify-between text-sm font-bold text-gray-400">
                                                <span><LucideIcon name="clock" className="w-4 h-4 inline ml-1" /> {r.time}</span>
                                                <span className={doneRecipes.includes(r.id) ? "text-[#10b981]" : "text-[#B07D62]"}>לשיעור</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const RecipeView = ({ r, setView, recipeNotes, setRecipeNotes, doneRecipes, setDoneRecipes }) => {
            const [localNote, setLocalNote] = useState(recipeNotes[r.id] || "");
            
            useEffect(() => {
                setLocalNote(recipeNotes[r.id] || "");
            }, [r.id]);
            
            const updateNote = (val) => {
                setLocalNote(val);
                setRecipeNotes(prev => ({ ...prev, [r.id]: val }));
            };

            const isDone = doneRecipes?.includes(r.id);
            const toggleDone = () => {
                setDoneRecipes(prev => prev.includes(r.id) ? prev.filter(id => id !== r.id) : [...prev, r.id]);
            };

            return (
                <div className="max-w-6xl mx-auto px-4 pt-4 md:pt-6 pb-24 text-right">
                    
                    <div className="mb-6 no-print">
                        <button onClick={() => setView('home')} className="flex items-center gap-2 text-[#B07D62] font-bold text-xl hover:underline"><LucideIcon name="arrow-right" /> <span>חזרה לפורטל</span></button>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <div className="lg:col-span-8 space-y-8">
                            
                            <div className="max-w-[380px] mx-auto w-full aspect-[9/16] bg-black rounded-[40px] overflow-hidden shadow-2xl border-4 border-white no-print flex flex-col items-center justify-center relative">
                                {r.vimeoId ? (
                                    <iframe 
                                        src={`https://player.vimeo.com/video/${r.vimeoId}${r.vimeoHash ? `?h=${r.vimeoHash}&` : '?'}title=0&byline=0&portrait=0`} 
                                        style={{position: 'absolute', top: 0, left: 0, width: '100%', height: '100%'}} 
                                        frameBorder="0" 
                                        allow="autoplay; fullscreen; picture-in-picture" 
                                        allowFullScreen
                                    ></iframe>
                                ) : (
                                    <div className="text-white/40 flex flex-col items-center">
                                        <LucideIcon name="video-off" className="w-16 h-16 mb-4 text-[#B07D62]" />
                                        <p className="font-bold text-white">הסרטון יעלה בקרוב</p>
                                    </div>
                                )}
                            </div>

                            <div className="flex flex-wrap justify-center gap-4 no-print mt-6 mb-8">
                                <button 
                                    onClick={toggleDone}
                                    className={`flex items-center gap-3 px-8 py-3 rounded-full font-bold text-lg shadow-md transition-all duration-300 hover:scale-105 ${
                                        isDone 
                                        ? 'bg-[#10b981] text-white border-2 border-[#10b981]' 
                                        : 'bg-white text-[#1B4D3E] border-2 border-[#1B4D3E] hover:bg-gray-50'
                                    }`}
                                >
                                    <LucideIcon name="check-circle" className={isDone ? "text-white w-6 h-6" : "text-[#1B4D3E] w-6 h-6"} />
                                    {isDone ? 'אלופה! הכנתי את המתכון' : 'סמני כשהכנת את המתכון'}
                                </button>
                                
                                <button 
                                    onClick={() => window.print()} 
                                    className="flex items-center gap-3 px-8 py-3 rounded-full font-bold text-white shadow-md transition-all duration-300 hover:scale-105 bg-gradient-to-r from-[#D4AF37] to-[#E5C565]"
                                >
                                    <LucideIcon name="printer" className="w-6 h-6" />
                                    הדפסי את המתכון
                                </button>
                            </div>

                            <div className="bg-white p-6 md:p-14 rounded-[60px] shadow-sm border-r-8 border-[#B07D62]">
                                <h1 className="text-4xl font-bold text-[#1B4D3E] mb-6">{r.name}</h1>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 text-right print-grid-2">
                                    <div>
                                        <h3 className="text-2xl font-bold text-[#B07D62] mb-4 md:mb-6 border-b pb-2">מה צריך?</h3>
                                        <ul className="space-y-4">
                                            {r.ingredients.map((ing, i) => <li key={i} className="flex items-center gap-3 text-lg md:text-xl border-b border-gray-50 pb-2"><LucideIcon name="check" className="text-green-500 w-5 h-5 no-print shrink-0" /> <span className="print-only text-green-600 font-bold ml-2">✓</span> {ing}</li>)}
                                        </ul>
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-bold text-[#B07D62] mb-4 md:mb-6 border-b pb-2 text-right">איך מכינים?</h3>
                                        <p className="text-lg md:text-xl leading-relaxed text-gray-700">הוראות ההכנה המדויקות מופיעות בסרטון ההדרכה. מומלץ להכין הכל מראש ולעבוד שלב אחרי שלב יחד איתי.</p>
                                    </div>
                                </div>

                                <div className="mt-12 md:mt-16 text-right">
                                    <h3 className="text-xl font-bold text-[#1B4D3E] mb-4 flex items-center justify-start gap-2">
                                        <LucideIcon name="edit-3" className="w-5 h-5 text-[#B07D62] no-print" />
                                        הערות אישיות שלי למתכון
                                    </h3>
                                    <textarea 
                                        value={localNote}
                                        onChange={(e) => updateNote(e.target.value)}
                                        placeholder="כתבי כאן הערות לעצמך... (הטקסט נשמר אוטומטית)"
                                        className="w-full p-6 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-2 focus:ring-[#B07D62] transition h-32 text-gray-700 leading-relaxed text-right no-print"
                                    />
                                    <div className="print-only print-notes-container">
                                        <span className="font-bold border-b border-dashed border-gray-400 pb-1 mb-2 block">הערות שלי למתכון זה:</span>
                                        {localNote || "לא נכתבו הערות אישיות למתכון זה."}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-4 space-y-6 text-right">
                            <div className="bg-[#D4AF37]/10 p-8 rounded-[40px] border-b-4 border-[#D4AF37]">
                                <h3 className="text-2xl font-bold text-[#B7950B] mb-6 flex items-center justify-start gap-2">
                                    <LucideIcon name="lightbulb" className="w-6 h-6 no-print" />
                                    הטיפים שלי
                                </h3>
                                <ul className="space-y-6">
                                    {r.tips.map((t, i) => <li key={i} className="text-lg leading-snug font-medium text-gray-700 border-b border-[#D4AF37]/20 pb-4">• {t}</li>)}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const IngredientsView = ({ setView, checkedItems, setCheckedItems, savedRecipes }) => {
            const toggleItem = (itemKey) => {
                setCheckedItems(prev => prev.includes(itemKey) ? prev.filter(i => i !== itemKey) : [...prev, itemKey]);
            };

            const hasCustomMenu = savedRecipes.length > 0;
            const recipesToShopFor = hasCustomMenu ? recipesList.filter(r => savedRecipes.includes(r.id)) : [];

            return (
                <div className="max-w-4xl mx-auto px-4 pt-6 pb-24 text-right">
                    <button onClick={() => setView('home')} className="mb-6 flex items-center gap-2 text-[#B07D62] font-bold text-lg no-print">
                        <LucideIcon name="arrow-right" /> <span>חזרה לפורטל</span>
                    </button>
                    <div className="bg-white p-8 md:p-20 rounded-[60px] shadow-xl border-b-8 border-[#1B4D3E]">
                        <h1 className="text-3xl md:text-4xl font-bold text-[#1B4D3E] text-center mb-4">רשימת המצרכים</h1>
                        <p className="text-xl text-gray-500 italic text-center mb-10">
                            {hasCustomMenu ? "כל המצרכים המדויקים לתפריט החג שבנית." : "כל מה שצריך כדי להתחיל לבשל בחירות."}
                        </p>

                        <div className="mb-8 flex justify-center no-print">
                            <button onClick={() => window.print()} className="flex items-center gap-2 bg-gray-100 px-6 py-2 rounded-full font-bold text-gray-700 hover:bg-gray-200 transition">
                                <LucideIcon name="printer" className="w-5 h-5" /> הדפסת רשימה
                            </button>
                        </div>

                        {hasCustomMenu && (
                            <div className="bg-[#10b981]/10 border border-[#10b981]/20 p-5 rounded-2xl mb-12 text-center no-print">
                                <span className="font-bold text-[#1B4D3E] flex items-center justify-center gap-2">
                                    <LucideIcon name="sparkles" className="text-[#10b981]" />
                                    בנית תפריט אישי! המצרכים פה למטה מחושבים בדיוק לפי מה שבחרת להכין.
                                </span>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                            {!hasCustomMenu ? (
                                generalIngredientsData.map((cat, i) => (
                                    <div key={i}>
                                        <h3 className="text-xl font-bold text-[#B07D62] border-b pb-3 mb-4">{cat.category}</h3>
                                        <div className="space-y-4">
                                            {cat.items.map((item, j) => {
                                                const uniqueKey = `gen-${item}`;
                                                const isChecked = checkedItems.includes(uniqueKey);
                                                return (
                                                    <div key={j} onClick={() => toggleItem(uniqueKey)} className={`check-item flex items-center gap-3 text-lg ${isChecked ? 'checked' : ''}`}>
                                                        <div className={`w-7 h-7 border-2 rounded shrink-0 flex items-center justify-center transition ${isChecked ? 'bg-[#1B4D3E] border-[#1B4D3E]' : 'border-gray-300'}`}>
                                                            {isChecked && <LucideIcon name="check" className="text-white w-5 h-5" />}
                                                        </div>
                                                        <span className="font-medium text-gray-700">{item}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))
                            ) : (
                                recipesToShopFor.map((recipe) => (
                                    <div key={recipe.id} className="bg-gray-50/50 p-6 rounded-3xl border border-gray-100">
                                        <h3 className="text-xl font-bold text-[#B07D62] border-b pb-3 mb-4">{recipe.name}</h3>
                                        <div className="space-y-4">
                                            {recipe.ingredients.map((ing, j) => {
                                                const uniqueKey = `recipe-${recipe.id}-${ing}`;
                                                const isChecked = checkedItems.includes(uniqueKey);
                                                return (
                                                    <div key={j} onClick={() => toggleItem(uniqueKey)} className={`check-item flex items-start gap-3 text-lg ${isChecked ? 'checked' : ''}`}>
                                                        <div className={`w-7 h-7 border-2 rounded shrink-0 flex items-center justify-center mt-0.5 transition ${isChecked ? 'bg-[#1B4D3E] border-[#1B4D3E]' : 'border-gray-300'}`}>
                                                            {isChecked && <LucideIcon name="check" className="text-white w-5 h-5" />}
                                                        </div>
                                                        <span className="font-medium text-gray-700 leading-tight">{ing}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [user, setUser] = useState(null); 
            const [hasAccess, setHasAccess] = useState(false); 
            const [loading, setLoading] = useState(true); 
            const [view, setView] = useState('home'); 
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            const [emailInput, setEmailInput] = useState(localStorage.getItem('savedEmail') || "");
            const [passwordInput, setPasswordInput] = useState("");
            const [loginError, setLoginError] = useState("");

            const [savedRecipes, setSavedRecipes] = useState(JSON.parse(localStorage.getItem('saves') || '[]'));
            const [doneRecipes, setDoneRecipes] = useState(JSON.parse(localStorage.getItem('done') || '[]'));
            const [recipeNotes, setRecipeNotes] = useState(JSON.parse(localStorage.getItem('notes') || '{}'));
            const [checkedItems, setCheckedItems] = useState(JSON.parse(localStorage.getItem('checkedItems') || '[]'));
            
            const [searchQuery, setSearchQuery] = useState("");
            const [categoryFilter, setCategoryFilter] = useState("הכל");

            const supportLink = "https://wa.me/504207702?text=היי+רבקה+יקירה,+יש+לי+שאלה+לגבי+הקורס";

            const previewMode = true;

            useEffect(() => {
                let wakeLock = null;
                const requestWakeLock = async () => {
                    if (view === 'recipe' && 'wakeLock' in navigator) {
                        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
                    }
                };
                requestWakeLock();
                return () => { if (wakeLock) wakeLock.release().then(() => wakeLock = null); };
            }, [view]);

            useEffect(() => {
                auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
                    return auth.onAuthStateChanged(async (u) => {
                        if (u) {
                            const cleanEmail = u.email.toLowerCase();
                            const doc = await db.collection('paid_users').doc(cleanEmail).get();
                            if (doc.exists && doc.data().hasAccess) {
                                setHasAccess(true);
                                setUser(u);
                            } else { auth.signOut(); }
                        } else {
                            setUser(null);
                            setHasAccess(false);
                        }
                        setLoading(false);
                    });
                });
            }, []);

            useEffect(() => {
                localStorage.setItem('saves', JSON.stringify(savedRecipes));
                localStorage.setItem('done', JSON.stringify(doneRecipes));
                localStorage.setItem('notes', JSON.stringify(recipeNotes));
                localStorage.setItem('checkedItems', JSON.stringify(checkedItems));
            }, [savedRecipes, doneRecipes, recipeNotes, checkedItems]);

            useEffect(() => {
                const handleScroll = () => { if (isMenuOpen) setIsMenuOpen(false); };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, [isMenuOpen]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(emailInput.trim().toLowerCase(), passwordInput);
                    localStorage.setItem('savedEmail', emailInput);
                } catch (err) {
                    setLoginError("פרטי הכניסה אינם נכונים.");
                    setLoading(false);
                }
            };

            const handleLogout = () => {
                auth.signOut().then(() => {
                    setUser(null);
                    setHasAccess(false);
                    setView('home');
                });
            };

            const filteredRecipes = useMemo(() => {
                return recipesList.filter(r => {
                    const matchesSearch = r.name.toLowerCase().includes(searchQuery.toLowerCase());
                    
                    let matchesCategory = true;
                    if (categoryFilter === "התפריט שלי") matchesCategory = savedRecipes.includes(r.id);
                    else if (categoryFilter === "הכנתי") matchesCategory = doneRecipes.includes(r.id);
                    else if (categoryFilter !== "הכל") matchesCategory = r.category === categoryFilter;

                    return matchesSearch && matchesCategory;
                });
            }, [searchQuery, categoryFilter, savedRecipes, doneRecipes]);

            const progress = (doneRecipes.length / recipesList.length) * 100;

            if (loading && !previewMode) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#F8F9FA]">
                    <div className="w-10 h-10 border-4 border-[#B07D62] border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-bold text-[#1B4D3E]">מכינה את המטבח שלך...</p>
                </div>
            );

            if (!previewMode && (!user || !hasAccess)) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-[#F8F9FA]">
                    <div className="w-full max-w-md bg-white p-10 rounded-[40px] shadow-xl border-b-8 border-[#B07D62]">
                        <div className="text-center mb-8">
                             <div className="inline-flex p-4 bg-[#B07D62]/10 rounded-full text-[#B07D62] mb-4">
                                <LucideIcon name="lock" size="32" />
                             </div>
                             <h1 className="text-3xl font-bold text-[#1B4D3E]">כניסה לפורטל פסח</h1>
                             <p className="text-gray-400 mt-2">הזיני פרטים כדי להתחיל לבשל בחירות</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div className="space-y-2 text-right">
                                <label className="block font-bold text-sm mr-1">כתובת מייל</label>
                                <div className="relative">
                                    <input type="email" value={emailInput} onChange={e => setEmailInput(e.target.value)} className="w-full p-4 pr-12 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#B07D62]" required />
                                    <LucideIcon name="mail" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400" size="18" />
                                </div>
                            </div>
                            <div className="space-y-2 text-right">
                                <label className="block font-bold text-sm mr-1">סיסמה</label>
                                <div className="relative">
                                    <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full p-4 pr-12 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-[#B07D62]" required />
                                    <LucideIcon name="key-round" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400" size="18" />
                                </div>
                            </div>
                            {loginError && <p className="text-red-500 text-sm text-center font-bold">{loginError}</p>}
                            <button className="w-full bg-[#B07D62] text-white py-5 rounded-2xl font-bold text-xl shadow-lg hover:scale-[1.02] transition">התחברי לקורס</button>
                        </form>
                    </div>
                    <p className="mt-8 text-gray-400 font-bold uppercase tracking-widest text-xs italic">רבקה הולצברג | המטבח הבריא</p>
                </div>
            );

            return (
                <div className="portal-wrapper min-h-screen">
                    <header className="bg-white border-b sticky top-0 z-50 h-24 flex items-center no-print shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 w-full flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="relative">
                                    <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="px-5 py-2 bg-[#F8F9FA] text-[#1B4D3E] hover:bg-gray-100 rounded-xl font-bold text-lg flex items-center gap-3 border">
                                        <LucideIcon name={isMenuOpen ? "x" : "menu"} />
                                        <span>מה תרצי להכין?</span>
                                    </button>
                                    {isMenuOpen && (
                                        <div className="absolute top-full right-0 mt-3 bg-white shadow-2xl rounded-[35px] border w-80 p-6 z-[100] text-right">
                                            <button onClick={() => { setView('home'); setIsMenuOpen(false); }} className="w-full p-4 hover:bg-gray-50 rounded-2xl font-bold flex items-center justify-between text-xl text-[#1B4D3E]"><span>דף הבית</span> <LucideIcon name="home" /></button>
                                            <button onClick={() => { setView('shopping'); setIsMenuOpen(false); }} className="w-full p-4 hover:bg-gray-50 rounded-2xl font-bold flex items-center justify-between text-xl text-[#1B4D3E]"><span>רשימת מצרכים</span> <LucideIcon name="shopping-bag" /></button>
                                            <div className="h-px bg-gray-100 my-4"></div>
                                            <div className="max-h-60 overflow-y-auto pr-2">
                                                {recipesList.map(r => <button key={r.id} onClick={() => { setSelectedRecipe(r); setView('recipe'); setIsMenuOpen(false); }} className="w-full text-right p-3 hover:bg-gray-50 rounded-xl text-lg flex items-center justify-between text-gray-600"><span>{r.name}</span> <LucideIcon name="chevron-left" className="w-4 h-4" /></button>)}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <span className="font-bold text-[#1B4D3E] text-2xl italic hidden md:block">פסח של חירות</span>
                            </div>
                            <button onClick={handleLogout} className="p-3 text-gray-400 hover:text-red-500 transition-all"><LucideIcon name="log-out" className="w-8 h-8" /></button>
                        </div>
                    </header>

                    <main>
                        {view === 'home' && <HomeView 
                            searchQuery={searchQuery} setSearchQuery={setSearchQuery}
                            categoryFilter={categoryFilter} setCategoryFilter={setCategoryFilter}
                            filteredRecipes={filteredRecipes}
                            savedRecipes={savedRecipes} setSavedRecipes={setSavedRecipes}
                            doneRecipes={doneRecipes} setDoneRecipes={setDoneRecipes}
                            setView={setView} setSelectedRecipe={setSelectedRecipe}
                            progress={progress}
                        />}
                        {view === 'recipe' && <RecipeView 
                            r={selectedRecipe} setView={setView} 
                            recipeNotes={recipeNotes} setRecipeNotes={setRecipeNotes}
                            doneRecipes={doneRecipes} setDoneRecipes={setDoneRecipes}
                        />}
                        {view === 'shopping' && <IngredientsView 
                            setView={setView} 
                            checkedItems={checkedItems} setCheckedItems={setCheckedItems} 
                            savedRecipes={savedRecipes}
                        />}
                    </main>

                    <footer className="mt-12 py-8 mb-24 border-t border-gray-200 text-center text-gray-400 text-sm px-4 no-print">
                        <p className="font-bold mb-2 text-[#B07D62]">כל הזכויות שמורות לרבקה הולצברג © 2026 | המטבח הבריא</p>
                        <p className="max-w-2xl mx-auto leading-relaxed">התוכן, המתכונים והסרטונים נועדו לשימוש אישי של רוכשת הקורס בלבד. אין להעתיק, לשכפל, להפיץ או להעביר לצד ג' בכל דרך שהיא ללא אישור בכתב.</p>
                    </footer>

                    <div className="fixed bottom-6 left-6 z-40 no-print">
                        <a href={supportLink} target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 bg-[#25D366] text-white px-5 py-3 rounded-full shadow-lg hover:scale-105 transition-all border-2 border-white">
                            <LucideIcon name="message-circle" className="w-6 h-6" />
                            <span className="font-bold text-base">רבקה, יש לי שאלה</span>
                        </a>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
