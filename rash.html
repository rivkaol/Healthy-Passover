<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פסח של חירות אמיתית במטבח - רבקה הולצברג</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Rubik', sans-serif; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-bottom: 4px solid #B07D62;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
        }
        .btn-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #E5C565 100%);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }
        .btn-terracotta {
            background: linear-gradient(135deg, #B07D62 0%, #d19a7e 100%);
            color: white;
            transition: all 0.3s ease;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .gold-badge-shine {
            background: linear-gradient(to right, #B7950B 0%, #D4AF37 40%, #F9E79F 50%, #D4AF37 60%, #B7950B 100%);
            background-size: 200% auto;
            animation: shine 4s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
        .highlight {
            background-color: rgba(212, 175, 55, 0.12);
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 600;
            color: #1B4D3E;
        }
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .text-break-period {
            white-space: pre-line;
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }
        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }
    </style>
</head>
<body class="bg-[#F8F9FA] text-[#333]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconWrapper = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const Check = (p) => <IconWrapper {...p}><path d="M20 6 9 17l-5-5"/></IconWrapper>;
        const Star = (p) => <IconWrapper {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconWrapper>;
        const Leaf = (p) => <IconWrapper {...p}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></IconWrapper>;
        const PlayCircle = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></IconWrapper>;
        const ArrowLeft = (p) => <IconWrapper {...p}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></IconWrapper>;
        const Quote = (p) => <IconWrapper {...p}><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.75-2-2-2H4c-1.25 0-2 .75-2 2v7c0 1.25.75 2 2 2h4c0 2.5-1 4.5-4 5.5L3 21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.75-2-2-2h-4c-1.25 0-2 .75-2 2v7c0 1.25.75 2 2 2h4c0 2.5-1 4.5-4 5.5L15 21z"/></IconWrapper>;
        const AlertCircle = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;
        const XCircle = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></IconWrapper>;
        const ShoppingCart = (p) => <IconWrapper {...p}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></IconWrapper>;
        const FileText = (p) => <IconWrapper {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></IconWrapper>;
        const Heart = (p) => <IconWrapper {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></IconWrapper>;

        const App = () => {
            const purchaseUrl = "https://bit.ly/4slt7in";
            const [showFloatingBtn, setShowFloatingBtn] = useState(false);
            const [selectedRecipe, setSelectedRecipe] = useState(null);

            useEffect(() => {
                const handleScroll = () => {
                    if (window.scrollY > 800) setShowFloatingBtn(true);
                    else setShowFloatingBtn(false);

                    if (selectedRecipe) {
                        setSelectedRecipe(null);
                    }
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, [selectedRecipe]);

            const formatText = (str) => {
                if (!str) return "";
                const parts = str.split('.');
                return parts.map((p, i) => {
                    const text = p.trim();
                    if (text === "" && i === parts.length - 1) return null;
                    return (
                        <span key={i}>
                            {text}{i < parts.length - 1 ? "." : ""}
                            {i < parts.length - 1 && <br />}
                        </span>
                    );
                });
            };

            const recipes = [
                { name: "קרקרים – לנשנוש ולהגשה", img: "a.jpg" },
                { name: "לחם שקדים – הלחם של כל בוקר", img: "b.jpg" },
                { name: "לחם לטוסטים – כי מגיע לך טוסט", img: "c.jpg" },
                { name: "בייגלס – רכים, ממכרים, וכיף להגיש", img: "d.jpg" },
                { name: "פיצה לפסח – יוצאת אמיתית", img: "e.jpg" },
                { name: "בראוניז – שוקולדיים ועשירים", img: "f.jpg" },
                { name: "חיתוכיות פקאן", img: "g.jpg" },
                { name: "חיתוכיות שוקולד אגוזים", img: "h.jpg" },
                { name: "עוגיות שוקולד צ'יפס", img: "i.jpg" },
                { name: "כדורי קפוצ'ינו בציפוי שוקולד", img: "j.jpg" },
                { name: "עוגת מוס שוקולד", img: "k.jpg" },
                { name: "פאי תפוחים מפנק", img: "l.jpg" }
            ];

            const testimonials = [
                { img: "a1.jpg", size: "large" },
                { img: "a2.jpg", size: "large" },
                { img: "a3.jpg", size: "small" },
                { img: "a4.jpg", size: "small" }
            ];

            return (
                <div dir="rtl" className="min-h-screen bg-[#F8F9FA] text-[#333] overflow-x-hidden relative">
                    
                    {/* Floating CTA */}
                    {showFloatingBtn && (
                        <div className="fixed bottom-6 inset-x-0 z-[100] px-4 fade-in-up flex justify-center text-center">
                            <a href={purchaseUrl} className="btn-terracotta w-full max-w-lg py-4 rounded-full font-bold text-lg shadow-[0_15px_40px_rgba(176,125,98,0.4)] flex items-center justify-center gap-3 border-2 border-white/20">
                                <span>אני רוצה פסח כזה – אני מצטרפת!</span>
                                <ArrowLeft size={20} />
                            </a>
                        </div>
                    )}

                    {/* Modal for Recipe Cards */}
                    {selectedRecipe && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 modal-overlay" onClick={() => setSelectedRecipe(null)}>
                            <div className="bg-white rounded-[40px] overflow-hidden shadow-2xl max-w-lg w-full relative animate-float border-b-8 border-[#B07D62]" onClick={e => e.stopPropagation()}>
                                <div className="aspect-[1200/1260] w-full bg-gray-100 overflow-hidden">
                                    <img src={selectedRecipe.img} alt={selectedRecipe.name} className="w-full h-full object-cover" />
                                </div>
                                <div className="p-8 text-center bg-white">
                                    <h3 className="text-2xl font-bold text-[#1B4D3E] mb-2">{selectedRecipe.name}</h3>
                                    <p className="text-sm text-gray-400">גללי כדי לחזור לעמוד</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Hero Section */}
                    <header className="relative pt-12 pb-20 lg:pt-16 lg:pb-32 overflow-hidden">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <div className="space-y-8 z-10 max-w-4xl mx-auto">
                                <div className="inline-flex flex-wrap justify-center items-center gap-2 px-6 py-2 rounded-full bg-white border border-[#B07D62]/20 text-[#1B4D3E] text-xs md:text-base font-bold shadow-sm">
                                    <Leaf size={16} className="text-[#B07D62]" />
                                    <span>ללא גלוטן | ללא סוכר | ללא קטניות</span>
                                    <span className="hidden md:inline">|</span>
                                    <span className="highlight px-2 py-0.5">ללא קמח תפוחי אדמה</span>
                                    <span className="hidden md:inline">|</span>
                                    <span>פשוט להכנה</span>
                                </div>
                                <h1 className="text-4xl lg:text-7xl font-bold leading-tight text-[#1B4D3E] tracking-tight">
                                    {formatText("פסח שבו את לא צריכה לבחור בין לאכול טוב לבין להרגיש טוב.")}
                                </h1>
                                <div className="text-xl lg:text-3xl text-gray-700 max-w-3xl mx-auto leading-relaxed font-normal space-y-2">
                                    <p>לחם שקדים עשיר. פיצה קריספית. קרקרים לכל רגע. בראוניז נימוחים.</p>
                                    <p className="text-[#B07D62] font-semibold underline decoration-[#B07D62]/20 underline-offset-8">הכל מסודר, הכל מוכן – והכל בשבילך.</p>
                                </div>

                                <div className="relative mt-12 mx-auto w-full max-w-[600px] group px-2 md:px-0">
                                    <div className="relative animate-float bg-white rounded-[40px] shadow-[0_30px_60px_-15px_rgba(0,0,0,0.12)] border-[10px] border-white overflow-hidden aspect-[1200/1260]">
                                        <img src="1.jpg" alt="קורס פסח" className="w-full h-full object-cover" />
                                        
                                        <div className="absolute bottom-6 right-6 w-28 h-28 md:w-44 md:h-44 bg-[#D4AF37] rounded-full text-white flex flex-col items-center justify-center text-center p-2 md:p-4 shadow-2xl border-4 border-white/50 backdrop-blur-sm z-20 gold-badge-shine">
                                            <span className="text-[10px] md:text-sm font-medium tracking-tight opacity-95 uppercase">פסח של חירות</span>
                                            <div className="flex items-start gap-0.5 mt-1">
                                                <span className="text-sm md:text-2xl font-bold mt-1.5">₪</span>
                                                <span className="text-3xl md:text-6xl font-extrabold leading-none">147</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="pt-10">
                                    <a href={purchaseUrl} className="btn-gold px-8 md:px-14 py-4 md:py-6 rounded-full font-bold text-lg md:text-xl shadow-2xl flex items-center justify-center gap-4 group inline-flex max-w-full">
                                        <span>אני רוצה פסח כזה</span>
                                        <ArrowLeft size={24} className="group-hover:-translate-x-2 transition-transform shrink-0" />
                                    </a>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Empathy Section */}
                    <section className="py-24 bg-white relative overflow-hidden">
                        <div className="max-w-4xl mx-auto px-4 text-center">
                            <h2 className="text-3xl md:text-5xl font-bold text-[#1B4D3E] mb-12">בואי נדבר רגע. <span className="text-[#B07D62]">בינינו.</span></h2>
                            <div className="space-y-8 text-xl md:text-2xl text-gray-700 leading-relaxed font-light text-right">
                                <p>{formatText("את כבר יודעת מה טוב לגוף שלך. את לא אוכלת סוכר סתם. את לא מתפשרת על איך שאת מרגישה.")}</p>
                                <p>{formatText("את עבדת על עצמך – ואת רוצה לשמור על זה גם בפסח. אבל פסח הוא לא בדיוק החג הכי פשוט לזה.")}</p>
                                
                                <div className="p-8 bg-[#B07D62]/5 rounded-[40px] border-r-8 border-[#B07D62] mt-12 text-right shadow-sm">
                                    <p className="font-bold text-[#1B4D3E] mb-6 italic underline decoration-[#B07D62]/20 underline-offset-4">כי פסח מביא איתו אתגרים שאת מכירה טוב מדי:</p>
                                    <ul className="space-y-8">
                                        <li className="flex gap-6">
                                            <AlertCircle className="text-[#B07D62] shrink-0 mt-1" size={28} />
                                            <span className="text-lg md:text-xl leading-relaxed font-normal"><span className="highlight">קמח תפוחי אדמה</span> בכל מקום. שעושה אותך כבדה, נפוחה, ולא באמת מזין.</span>
                                        </li>
                                        <li className="flex gap-6">
                                            <XCircle className="text-[#B07D62] shrink-0 mt-1" size={28} />
                                            <span className="text-lg md:text-xl leading-relaxed font-normal">מצות? גם לא ממש אופציה. את נשארת בפסח בלי <span className="highlight">תחליף אמיתי</span> לימים שלמים.</span>
                                        </li>
                                        <li className="flex gap-6">
                                            <ShoppingCart className="text-[#B07D62] shrink-0 mt-1" size={28} />
                                            <span className="text-lg md:text-xl leading-relaxed font-normal">בשגרה יש לך פתרונות. אבל בפסח? החנויות לא עוזרות. את <span className="highlight text-primary font-medium">על עצמך לגמרי</span>.</span>
                                        </li>
                                    </ul>
                                </div>
                                
                                <p className="mt-12 text-xl md:text-2xl font-semibold text-[#1B4D3E] text-center">
                                    {formatText("ומתוקים? ויתרת מראש. כי לא מצאת קינוח שהוא גם בלי סוכר, גם טעים באמת, וגם לא גורם לך להרגיש רע אחרי.")}
                                </p>
                                <p className="text-4xl font-bold text-[#B07D62] text-center mt-8 tracking-tighter">
                                    את לא צריכה להמשיך ככה.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* Meet Rivka */}
                    <section className="py-24 bg-[#F8F9FA] overflow-hidden">
                        <div className="max-w-6xl mx-auto px-4">
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
                                <div className="lg:col-span-4 flex justify-center order-1 lg:order-2">
                                    <div className="relative group">
                                        <div className="absolute inset-0 bg-[#B07D62] rounded-full opacity-10 blur-3xl scale-150"></div>
                                        <img src="me.jpg" alt="רבקה הולצברג" className="relative w-56 h-56 lg:w-72 lg:h-72 object-cover rounded-[50px] shadow-2xl border-8 border-white transform transition-transform duration-500 group-hover:rotate-2 shrink-0" />
                                    </div>
                                </div>

                                <div className="lg:col-span-8 relative text-right order-2 lg:order-1">
                                    <div className="flex items-center justify-center lg:justify-start gap-3 text-2xl font-bold text-[#B07D62] mb-4 tracking-widest uppercase">
                                        <Heart size={24} className="fill-[#B07D62]" />
                                        <span>היי, אני רבקה הולצברג</span>
                                    </div>
                                    <h2 className="text-3xl md:text-5xl font-bold text-[#1B4D3E] mb-8 text-center lg:text-right text-break-period">
                                        יש פתרון. בניתי אותו בדיוק בשבילך.
                                    </h2>
                                    
                                    <div className="space-y-6 text-xl text-gray-700 leading-relaxed font-light mb-10 text-right">
                                        <p>{formatText("בניתי את הקורס הזה כי חיפשתי אותו עבור עצמי – ולא מצאתי. רציתי מתכונים שהם גם ללא גלוטן וסוכר, גם ללא קמח תפוחי אדמה, וגם פשוטים להכנה.")}</p>
                                        <div className="bg-white p-8 rounded-3xl border-r-8 border-[#B07D62] shadow-sm relative">
                                            <Quote className="absolute -top-4 -right-4 w-12 h-12 text-[#B07D62] opacity-10" />
                                            <p className="italic font-normal relative z-10 leading-relaxed text-right">
                                                "{formatText("בלי מיקסר, בלי הפרדת ביצים, בלי הסתבכות. וגם טעימים באמת – כאלה שתרצי להכין שוב גם אחרי פסח.")}"
                                            </p>
                                        </div>
                                    </div>

                                    <div className="text-center lg:text-right">
                                        <div className="flex flex-col gap-4 items-center lg:items-start">
                                            <p className="text-xl md:text-2xl font-medium text-[#1B4D3E] opacity-80">אז יצרתי אותם. בדקתי אותם. שכללתי אותם.</p>
                                            <div className="px-6 py-2 bg-[#B07D62] text-white rounded-full shadow-md text-lg font-bold tracking-wide inline-block hover:scale-105 transition duration-300">
                                                ועכשיו הם שלך.
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Interactive 12 Recipes List */}
                    <section className="py-24 bg-[#1B4D3E] text-white">
                        <div className="max-w-6xl mx-auto px-4">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-5xl font-bold mb-6 tracking-tight text-white leading-tight">
                                    <span className="bg-white/10 px-6 py-1 rounded-xl border border-white/20 block md:inline-block mb-4 md:mb-0 font-bold">12 מתכונים</span> שפשוט... עובדים.
                                </h2>
                                <p className="text-xl text-green-100/80 font-light italic">לחצי על שם המתכון כדי לראות אותו</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-20 text-right">
                                {recipes.map((recipe, idx) => (
                                    <button 
                                        key={idx} 
                                        onClick={() => setSelectedRecipe(recipe)}
                                        className="p-5 rounded-2xl border transition group flex items-center gap-4 text-right w-full bg-white/5 border-white/10 hover:bg-white hover:text-[#1B4D3E] hover:scale-[1.02] shadow-sm active:scale-95"
                                    >
                                        <Check size={20} className="text-[#D4AF37] group-hover:text-[#B07D62] shrink-0" />
                                        <p className="font-medium text-lg">{recipe.name}</p>
                                    </button>
                                ))}
                            </div>

                            {/* Center Preview Image Area */}
                            <div className="max-w-[600px] mx-auto text-center px-4">
                                <div className="glass-card bg-white rounded-[40px] overflow-hidden p-6 md:p-8 shadow-3xl border-b-8 border-[#B07D62] mb-6">
                                    <div className="aspect-[1200/1260] w-full bg-gray-100 rounded-[35px] overflow-hidden relative shadow-inner border-2 border-gray-50">
                                        <img src="2.jpg" alt="כל המתכונים" className="w-full h-full object-cover" />
                                    </div>
                                </div>
                                <p className="text-2xl md:text-3xl font-bold tracking-tight text-white drop-shadow-sm">
                                    כל הטוב הזה מחכה לך בפנים
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* How It Works */}
                    <section className="py-24 bg-white text-center">
                        <div className="max-w-5xl mx-auto px-4">
                            <h2 className="text-3xl md:text-5xl font-bold text-[#1B4D3E] mb-16">איך הקורס עובד?</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10 mb-16 text-right">
                                <div className="p-10 bg-gray-50 rounded-[40px] border-b-4 border-[#B07D62] relative group">
